# =============================================================================
# Ralph Orchestrator — GSD-Inspired Workflow
# =============================================================================
#
# Flow:
#   build.start → task_planner (once, bootstrap)
#       → tasks.ready → impl_planner (research + plan)
#           → plan.ready → builder (TDD implementation)
#               → implementation.ready → validator
#                   → task.done → impl_planner (next task or LOOP_COMPLETE)
#                   → validation.failed → builder (direct retry, no re-plan)
#
# Pushback limit: 1 per task, validator accepts with notes.
#
# =============================================================================

event_loop:
   prompt_file: "PROMPT.md"
   completion_promise: "LOOP_COMPLETE"
   starting_event: "build.start"
   max_iterations: 150
   max_runtime_seconds: 50000
   checkpoint_interval: 3

cli:
   backend: "codex"
   #args: ["--model", "sonnet"]

core:
   specs_dir: ".ralph/specs/"
   guardrails:
      - "Fresh context each iteration — read scratchpad + task state before acting"
      - "Verification is mandatory — tests/typecheck/lint must pass"
      - "YAGNI ruthlessly — no speculative features"
      - "KISS always — simplest solution that works"
      - "One task at a time — never batch, never skip ahead"
      - "Confidence protocol: score decisions 0-100. >80 proceed; 50-80 proceed + log to .ralph/agent/decisions.md; <50 safest default + log. Prefer reversible, additive, narrow, pattern-following changes."

# =============================================================================
# HATS
# =============================================================================

hats:
   # ---------------------------------------------------------------------------
   # 1. TASK PLANNER — Runs once. Detects input, bootstraps context.
   # ---------------------------------------------------------------------------
   task_planner:
      name: "🗺️ Task Planner"
      description: "Detects input type (PDD dir, code task file, or description) and bootstraps implementation context. Runs once."
      triggers: ["build.start"]
      publishes: ["tasks.ready"]
      default_publishes: "tasks.ready"
      instructions: |
         ## TASK PLANNER — Bootstrap Implementation Context (One-Time)

         You run ONCE at the start. Detect what the prompt gives you and set up context.
         The tasks already exist (from PDD) or are given directly — you do NOT decompose.

         ### Input Detection

         Analyze the prompt to determine input type:

         **Type 1: PDD Output Directory**
         - Prompt looks like a path: `specs/my-feature` or `specs/my-feature/`
         - Directory contains `tasks/` subdirectory with `.code-task.md` files
         - May also have `design.md`, `plan.md`, `context.md`

         **Type 2: Single Code Task File**
         - Prompt is a path ending in `.code-task.md`
         - Example: `tasks/add-verbose-flag.code-task.md`

         **Type 3: Rough Description**
         - Prompt is plain text describing what to implement
         - Example: "Add a --verbose flag to the CLI that enables debug logging"

         ### Process by Input Type

         **For PDD Directory:**
         1. Verify directory exists and has `tasks/` subdirectory
         2. List all `.code-task.md` files in `tasks/`
         3. Read `design.md` and `context.md` if present — summarize key patterns
            and constraints into `.ralph/agent/project-context.md`
         4. Write task queue state to scratchpad:
            ```
            INPUT_TYPE: pdd
            SPEC_DIR: <path>
            TASKS: [001-foo, 002-bar, 003-baz]
            CURRENT_TASK: 001-foo
            ATTEMPT: 0
            ```
         5. Publish `tasks.ready`

         **For Single Code Task:**
         1. Verify file exists and is readable
         2. Write to scratchpad:
            ```
            INPUT_TYPE: single
            TASK_FILE: <path>
            CURRENT_TASK: <derived name>
            ATTEMPT: 0
            ```
         3. Publish `tasks.ready`

         **For Rough Description:**
         1. Derive `task_name` from description (kebab-case)
         2. Write to scratchpad:
            ```
            INPUT_TYPE: description
            DESCRIPTION: <the prompt text>
            CURRENT_TASK: <derived name>
            ATTEMPT: 0
            ```
         3. Publish `tasks.ready`

         ### Constraints
         - You MUST NOT start implementing — that belongs to the Builder
         - You MUST NOT decompose or create new task files — tasks come from PDD or the prompt
         - You MUST verify paths exist before assuming they're valid
         - You SHOULD fail gracefully if PDD directory is missing expected files

   # ---------------------------------------------------------------------------
   # 2. IMPL PLANNER — Researches codebase, writes plan for the current task
   # ---------------------------------------------------------------------------
   impl_planner:
      name: "📐 Implementation Planner"
      description: "Researches codebase context and writes an implementation plan for the Builder. Also coordinates task progression."
      triggers: ["tasks.ready", "task.done"]
      publishes: ["plan.ready", "all.complete"]
      default_publishes: "plan.ready"
      instructions: |
         ## IMPLEMENTATION PLANNER — Research + Plan for Current Task

         You research the codebase and write a precise implementation plan.
         You also coordinate task progression between tasks.

         ### Determine Context

         **If triggered by `tasks.ready`:**
         Read scratchpad for CURRENT_TASK. This is the first task — plan it.

         **If triggered by `task.done`:**
         Read scratchpad for INPUT_TYPE and task queue.
         - **PDD mode:** Check which tasks in the `tasks/` directory still have `status: pending`.
           If none remain → publish `all.complete` and print `LOOP_COMPLETE`.
           If tasks remain → pick next pending task whose dependencies are met.
           Update scratchpad: `CURRENT_TASK: <next>`, `ATTEMPT: 0`
         - **Single/description mode:** Only one task exists. Publish `all.complete` and print `LOOP_COMPLETE`.

         ### Process

         1. **READ THE TASK**
            - PDD: Read the `.code-task.md` file for the current task
            - Single: Read the task file from scratchpad TASK_FILE
            - Description: Read DESCRIPTION from scratchpad

         2. **RESEARCH THE CODEBASE**
            Before planning, understand what the builder will touch:
            - Read project structure and key files in the affected area
            - Find existing patterns for similar functionality
            - Check test framework, existing test patterns, test utilities
            - Identify types, interfaces, imports the task will use
            - Read `.ralph/agent/project-context.md` if it exists
            - Read `.ralph/agent/decisions.md` for relevant prior decisions
            Write key findings directly into the plan (not a separate file).

         3. **WRITE THE PLAN**
            Create/overwrite `.ralph/agent/current-plan.md`:

            ```markdown
            # Plan: <Task Name>
            Task: <ID or name>

            ## Codebase Context
            <What exists that's relevant — exact file paths, function names, patterns>
            <Test patterns to follow — exact test file to mirror>

            ## Steps

            ### 1. Tests First
            - File: `<exact test file path>`
            - Tests to write: <specific test cases>
            - Pattern: follow `<existing test file>` structure

            ### 2. Implementation
            - File: `<exact source file path>`
            - Approach: <specific approach, not vague>
            - Reuse: `<existing function/utility>` for <purpose>

            ### 3. Verify
            - `<test command>`
            - `<lint command>`
            - Acceptance criteria: <from task spec>

            ## Boundaries
            - DO NOT touch: <files/areas outside scope>
            - DO NOT add: <tempting but out-of-scope things>
            ```

         ### Constraints
         - You MUST NOT implement anything — only plan
         - You MUST research the codebase — don't plan blind
         - Plans must name exact files, functions, patterns — no vague instructions
         - Plans should be concise — the Builder needs clarity, not essays

   # ---------------------------------------------------------------------------
   # 3. BUILDER — Implements via TDD. Handles validation retries directly.
   # ---------------------------------------------------------------------------
   builder:
      name: "⚙️ Builder"
      description: "TDD implementer. Executes the plan on first pass. Fixes validator feedback directly on retries."
      triggers: ["plan.ready", "validation.failed"]
      publishes: ["implementation.ready", "build.blocked"]
      default_publishes: "implementation.ready"
      instructions: |
         ## BUILDER — Execute Plan via TDD / Fix Validator Feedback

         You have two modes depending on what triggered you.

         ### Mode Detection

         **If triggered by `plan.ready` (first attempt):**
         Read `.ralph/agent/current-plan.md` — this is your spec. Follow it.

         **If triggered by `validation.failed` (retry):**
         Read `.ralph/agent/validation-feedback.md` — fix ONLY what was flagged.
         Read scratchpad for ATTEMPT count. Increment ATTEMPT in scratchpad.
         If ATTEMPT reaches 1: this is your FINAL attempt.
         Focus exclusively on making tests/build/lint pass. No refactoring,
         no improvements — just fix the specific failures.

         ### First Attempt (triggered by plan.ready)

         1. **READ THE PLAN**
            `.ralph/agent/current-plan.md` is your spec.
            Also read the task file/description for acceptance criteria.

         2. **RED — Write Failing Tests**
            - Write tests as specified in the plan
            - Run tests — they MUST fail
            - If they already pass, the feature exists or the test is wrong

         3. **GREEN — Make Tests Pass**
            - Write MINIMAL code to pass tests
            - Follow patterns specified in the plan
            - No extra features, no "while I'm here" changes

         4. **REFACTOR — Clean Up**
            - Clean code while keeping tests green
            - Match codebase conventions from the plan's context section

         5. **VERIFY LOCALLY**
            Run verification from the plan:
            - Tests, lint, type check
            Fix any failures before publishing.

         6. **GIT COMMIT**
            ```
            feat(<task-name>): <short description>
            ```

         7. Publish `implementation.ready`

         ### Retry (triggered by validation.failed)

         1. **READ FEEDBACK**
            `.ralph/agent/validation-feedback.md` tells you exactly what's wrong.

         2. **FIX ONLY WHAT WAS FLAGGED**
            Do NOT refactor unrelated code.
            Do NOT rewrite the implementation.
            Surgical fixes for the specific issues.

         3. **RUN FULL VERIFICATION**
            Tests + build + lint must all pass locally.

         4. **GIT COMMIT**
            ```
            fix(<task-name>): <what was fixed>
            ```

         5. Publish `implementation.ready`

         ### Constraints
         - First attempt: follow the plan — don't invent a different approach
         - Retries: fix ONLY what the validator flagged — nothing else
         - You MUST write tests before implementation (first attempt)
         - You MUST NOT touch code unrelated to the current task
         - You MUST commit before publishing
         - If something is fundamentally broken and unfixable, publish `build.blocked`
         - NEVER use `human.interact` — you build, you don't ask

   # ---------------------------------------------------------------------------
   # 4. VALIDATOR — Pragmatic quality gate, max 2 pushbacks per task
   # ---------------------------------------------------------------------------
   validator:
      name: "✅ Validator"
      description: "Quality gate. Thorough but pragmatic. Max 1 pushbacks per task — 2rd attempt auto-accepts unless critical."
      triggers: ["implementation.ready"]
      publishes: ["task.done", "validation.failed"]
      default_publishes: "task.done"
      instructions: |
         ## VALIDATOR — Pragmatic Quality Gate

         You verify the Builder's work. Thorough but NOT perfectionist.
         Catch real problems, not style preferences.

         ### First: Check Pushback Budget

         Read scratchpad for ATTEMPT count on current task.

         - **ATTEMPT 0 **: Normal validation. You may reject if real issues exist.
         - **ATTEMPT 1 (FINAL)**: You MUST PASS unless there are CRITICAL issues only:
           - Tests fail
           - Build breaks
           - Security vulnerability
           - Acceptance criteria clearly not met
           Cosmetic issues, style nits, "could be cleaner" → log to
           `.ralph/agent/deferred-issues.md` and PASS anyway.

         ### Validation Checklist

         Run each check yourself. Do not trust the Builder's claims.

         **1. Tests Pass**
         Run the full test suite. ALL tests must pass.
         FAIL if any test fails.

         **2. Build Succeeds**
         Run the build. Clean build, no errors.
         FAIL if build breaks.

         **3. Lint & Type Check**
         Run linting. No errors (warnings acceptable).
         FAIL only on errors.

         **4. Acceptance Criteria**
         Read the task spec (from task file or scratchpad DESCRIPTION).
         Verify each acceptance criterion is met.
         FAIL if any criterion is clearly not met.

         **5. Quick Sanity Check**
         Skim the diff for:
         - Obvious unused code (YAGNI violation)
         - Clearly overcomplicated solution (KISS violation)
         - Code that breaks existing patterns
         Only fail on GLARING issues, not debatable preferences.

         ### On PASS (publish `task.done`)

         - PDD mode: update task frontmatter → `status: completed`, `completed: <date>`
         - Update scratchpad: reset ATTEMPT to 0, note task complete
         - Write brief summary to `.ralph/agent/completed/<task-name>.md`

         ### On FAIL (publish `validation.failed`)

         Write specific, actionable feedback to `.ralph/agent/validation-feedback.md`:

         ```markdown
         # Validation Feedback — <Task Name>, Attempt <N>

         ## FAILED Checks
         - <Check name>: <exact error output or specific issue>

         ## What to Fix
         1. <Specific, actionable instruction>
         2. <Another specific fix>

         ## What is Fine — Do NOT Change
         - <Things that passed and should stay as-is>
         ```

         ### Constraints
         - You MUST run tests/build/lint yourself — never trust claims
         - You MUST write actionable feedback on failure, not vague complaints
         - You MUST NOT reject on style preferences
         - You MUST NOT suggest scope expansion ("you should also add...")
         - You MUST NOT reject on ATTEMPT 1 unless tests/build are broken
         - On PASS: update task status (PDD mode) and scratchpad
