<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Project Dialog - Ralph Orchestrator</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4b2bee",
                        "primary-hover": "#3a21b8",
                        "background-light": "#f6f6f8",
                        "background-dark": "#131022",
                        "surface-dark": "#1d1933",
                        "input-bg": "#252041",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "mono": ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "Liberation Mono", "Courier New", "monospace"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem", 
                        "lg": "0.5rem", 
                        "xl": "0.75rem", 
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display text-slate-900 dark:text-slate-100 selection:bg-primary selection:text-white">
<!-- Main Background (Simulated Dashboard Content) -->
<div class="fixed inset-0 z-0 opacity-20 pointer-events-none overflow-hidden blur-[2px]">
<div class="grid grid-cols-12 gap-4 p-8 h-full">
<div class="col-span-2 bg-surface-dark rounded-xl h-full border border-slate-800"></div>
<div class="col-span-10 flex flex-col gap-4">
<div class="h-16 bg-surface-dark rounded-xl border border-slate-800 w-full"></div>
<div class="grid grid-cols-3 gap-4 h-64">
<div class="bg-surface-dark rounded-xl border border-slate-800"></div>
<div class="bg-surface-dark rounded-xl border border-slate-800"></div>
<div class="bg-surface-dark rounded-xl border border-slate-800"></div>
</div>
<div class="flex-1 bg-surface-dark rounded-xl border border-slate-800"></div>
</div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#0a0812]/80 backdrop-blur-sm transition-opacity">
<!-- Modal Content -->
<div class="relative w-full max-w-[600px] bg-[#141122] dark:bg-[#141122] border border-[#2d284d] rounded-xl shadow-2xl flex flex-col overflow-hidden animate-in fade-in zoom-in-95 duration-200">
<!-- Header -->
<div class="flex items-center justify-between px-6 py-5 border-b border-[#2d284d]">
<h2 class="text-xl font-bold tracking-tight text-white">New Project</h2>
<button class="text-slate-400 hover:text-white transition-colors p-1 rounded-lg hover:bg-[#2d284d]">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Body -->
<div class="p-6 space-y-6">
<!-- Project Name -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-300" for="project-name">Project Name</label>
<div class="relative group">
<input class="block w-full h-12 px-4 rounded-lg bg-input-bg border-slate-700/50 text-white placeholder-slate-500 focus:border-primary focus:ring-1 focus:ring-primary transition-all font-medium" id="project-name" placeholder="my-awesome-app" type="text"/>
</div>
</div>
<!-- Project Path -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-300" for="project-path">Project Path</label>
<div class="flex rounded-lg shadow-sm bg-input-bg border border-slate-700/50 focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all overflow-hidden group">
<input class="block w-full h-12 px-4 bg-transparent border-none text-white placeholder-slate-500 focus:ring-0 font-mono text-sm" id="project-path" placeholder="/Users/you/projects/my-app" type="text"/>
<button class="px-4 flex items-center justify-center border-l border-slate-700/50 hover:bg-[#2d284d] transition-colors text-slate-400 group-focus-within:border-primary/30 group-focus-within:text-primary">
<span class="material-symbols-outlined text-[20px]">folder_open</span>
</button>
</div>
</div>
<!-- Config & Detection Row -->
<div class="flex flex-col sm:flex-row gap-4">
<!-- Config File -->
<div class="flex-1 space-y-2">
<label class="block text-sm font-medium text-slate-300" for="config-file">Ralph Config</label>
<input class="block w-full h-12 px-4 rounded-lg bg-input-bg border-slate-700/50 text-white placeholder-slate-500 focus:border-primary focus:ring-1 focus:ring-primary transition-all font-mono text-sm" id="config-file" type="text" value="ralph.yml"/>
</div>
<!-- Detection Badge (Visual only based on prompt) -->
<div class="sm:w-1/3 space-y-2">
<label class="block text-sm font-medium text-slate-300">Environment</label>
<div class="flex items-center h-12 px-3 rounded-lg bg-[#2d284d]/50 border border-[#2d284d] select-none">
<div class="flex items-center gap-2 text-emerald-400">
<span class="material-symbols-outlined text-[20px]">javascript</span>
<span class="text-sm font-medium text-slate-200">Node.js</span>
</div>
<span class="ml-auto text-xs text-slate-500 font-medium px-2 py-0.5 rounded bg-slate-800/50">v18.x</span>
</div>
</div>
</div>
</div>
<!-- Footer -->
<div class="flex items-center justify-end gap-3 px-6 py-5 bg-[#0f0c1d] border-t border-[#2d284d]">
<button class="px-5 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:text-white hover:bg-[#2d284d] transition-colors focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2 focus:ring-offset-[#0f0c1d]">
                    Cancel
                </button>
<button class="px-5 py-2.5 rounded-lg text-sm font-medium bg-primary text-white hover:bg-primary-hover shadow-[0_0_15px_rgba(75,43,238,0.3)] transition-all hover:shadow-[0_0_20px_rgba(75,43,238,0.5)] focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-[#0f0c1d] flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">add</span>
                    Create Project
                </button>
</div>
</div>
</div>
</body></html>
